<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel de gráficos de market cap</title>
  <style>
    :root {
      --bg: #f7f5f2;
      --surface: #fcfbf8;
      --border: #d8d2ca;
      --text: #2d2a26;
      --muted: #6f6a64;
      --accent: #1f2a44;
      --shadow: 0 10px 30px rgba(31, 42, 68, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    .toolbar {
      position: fixed;
      top: 18px;
      left: 18px;
      z-index: 20;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      max-width: calc(100vw - 36px);
      padding: 12px 14px;
      background: rgba(252, 251, 248, 0.92);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .toolbar-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--accent);
      margin-right: 8px;
    }

    .toolbar button {
      border: 1px solid var(--border);
      background: white;
      color: var(--text);
      padding: 8px 12px;
      font-size: 13px;
      cursor: pointer;
      border-radius: 8px;
    }

    .toolbar button:hover {
      background: #f2eee8;
    }

    .toolbar .hint {
      font-size: 12px;
      color: var(--muted);
      margin-left: 4px;
    }

    #viewport {
      position: fixed;
      inset: 0;
      overflow: hidden;
      cursor: grab;
      background:
        linear-gradient(to right, rgba(0,0,0,0.03) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(0,0,0,0.03) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    #viewport.dragging {
      cursor: grabbing;
    }

    #canvas {
      position: absolute;
      top: 0;
      left: 0;
      transform-origin: 0 0;
      padding: 60px;
      display: grid;
      grid-template-columns: repeat(3, 1500px);
      gap: 40px;
      width: max-content;
    }

    .chart-card {
      margin: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      padding: 14px;
    }

    .chart-meta {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 10px;
      font-size: 13px;
    }

    .chart-year {
      font-weight: 700;
      color: var(--accent);
    }

    .chart-file {
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chart-card img {
      display: block;
      width: 1500px;
      height: auto;
      border: 1px solid #e6e0d8;
      background: white;
    }

    @media (max-width: 900px) {
      .toolbar {
        right: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <div class="toolbar-title">Painel de gráficos</div>
    <button id="zoomIn">Zoom +</button>
    <button id="zoomOut">Zoom -</button>
    <button id="resetView">Reset</button>
    <button id="fitView">Ajustar tudo</button>
    <div class="hint">Mouse wheel para zoom, arrastar para mover</div>

  <script>
    const viewport = document.getElementById("viewport");
    const canvas = document.getElementById("canvas");
    const zoomInBtn = document.getElementById("zoomIn");
    const zoomOutBtn = document.getElementById("zoomOut");
    const resetBtn = document.getElementById("resetView");
    const fitBtn = document.getElementById("fitView");

    let scale = 0.22;
    let minScale = 0.08;
    let maxScale = 3.5;
    let x = 40;
    let y = 80;

    let isDragging = false;
    let startX = 0;
    let startY = 0;
    let originX = 0;
    let originY = 0;

    function updateTransform() {
      canvas.style.transform = "translate(" + x + "px, " + y + "px) scale(" + scale + ")";
    }

    function zoomAt(clientX, clientY, factor) {
      const rect = viewport.getBoundingClientRect();
      const vx = clientX - rect.left;
      const vy = clientY - rect.top;

      const worldX = (vx - x) / scale;
      const worldY = (vy - y) / scale;

      const newScale = Math.max(minScale, Math.min(maxScale, scale * factor));
      scale = newScale;

      x = vx - worldX * scale;
      y = vy - worldY * scale;

      updateTransform();
    }

    function fitView() {
      const vw = viewport.clientWidth;
      const vh = viewport.clientHeight;

      const contentWidth = canvas.offsetWidth;
      const contentHeight = canvas.offsetHeight;

      const scaleX = (vw * 0.94) / contentWidth;
      const scaleY = (vh * 0.90) / contentHeight;

      scale = Math.min(scaleX, scaleY);
      scale = Math.max(minScale, Math.min(maxScale, scale));

      x = (vw - contentWidth * scale) / 2;
      y = (vh - contentHeight * scale) / 2;

      updateTransform();
    }

    function resetView() {
      scale = 0.22;
      x = 40;
      y = 80;
      updateTransform();
    }

    viewport.addEventListener("wheel", function(e) {
      e.preventDefault();
      const factor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
      zoomAt(e.clientX, e.clientY, factor);
    }, { passive: false });

    viewport.addEventListener("mousedown", function(e) {
      isDragging = true;
      viewport.classList.add("dragging");
      startX = e.clientX;
      startY = e.clientY;
      originX = x;
      originY = y;
    });

    window.addEventListener("mousemove", function(e) {
      if (!isDragging) return;
      x = originX + (e.clientX - startX);
      y = originY + (e.clientY - startY);
      updateTransform();
    });

    window.addEventListener("mouseup", function() {
      isDragging = false;
      viewport.classList.remove("dragging");
    });

    viewport.addEventListener("mouseleave", function() {
      isDragging = false;
      viewport.classList.remove("dragging");
    });

    zoomInBtn.addEventListener("click", function() {
      zoomAt(viewport.clientWidth / 2, viewport.clientHeight / 2, 1.2);
    });

    zoomOutBtn.addEventListener("click", function() {
      zoomAt(viewport.clientWidth / 2, viewport.clientHeight / 2, 1 / 1.2);
    });

    resetBtn.addEventListener("click", resetView);
    fitBtn.addEventListener("click", fitView);

    window.addEventListener("resize", fitView);

    updateTransform();
    setTimeout(fitView, 150);
  </script>
